<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="実績一覧">
  <link rel="manifest" href="/manifest.json">
  <title>実績一覧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">株式会社<span>日美</span></div>
  <button class="back-btn" id="backBtn" onclick="showTop()">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 2L4 7l5 5"/>
    </svg>
    戻る
  </button>
</header>

<!-- TOP PAGE -->
<div class="page active" id="topPage">
  <div class="top-hero">
    <h1>Our Works</h1>
    <p>カテゴリを選んでください</p>
  </div>
  <div class="category-grid" id="categoryGrid">
    <!-- JSで動的に生成 -->
  </div>
</div>

<!-- CATEGORY PAGE -->
<div class="page" id="categoryPage">
  <div class="category-header">
    <div class="category-title" id="categoryTitle"></div>
    <div class="category-subtitle" id="categorySubtitle"></div>
  </div>
  <div class="works-grid" id="worksGrid"></div>
</div>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="loading-spinner"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon"></div>
    <h3 id="modalTitle"></h3>
    <p id="modalBody"></p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">閉じる</button>
      <button class="modal-btn modal-btn-primary" id="modalActionBtn">開く</button>
    </div>
  </div>
</div>

<script>
  // ==============================
  // ★ここを書き換えてください★
  const SERVICE_ID = 'nichibi';
  const API_KEY    = 'rgymqZidkqQQhZN7paVGbeH88ijMiS1uUGgc';
  // ==============================

  const CATEGORIES = {
    web:     { label: 'Webサイト',    subtitle: 'WEB SITE', emoji: '🌐', tagClass: 'tag-web' },
    system:  { label: 'システム開発', subtitle: 'SYSTEM',   emoji: '⚙️', tagClass: 'tag-system' },
    graphic: { label: 'グラフィック', subtitle: 'GRAPHIC',  emoji: '🎨', tagClass: 'tag-graphic' },
    led:     { label: 'LED',          subtitle: 'LED',       emoji: '💡', tagClass: 'tag-led' },
  };

  const CATEGORY_ORDER = ['web', 'system', 'graphic', 'led'];

  let allWorks = []; // MicroCMSから取得した全データを保持

  // ==============================
  // MicroCMS からデータ取得
  // ==============================
  async function fetchWorks() {
    showLoading(true);
    try {
      const res = await fetch(
        `https://${SERVICE_ID}.microcms.io/api/v1/works?limit=100`,
        { headers: { 'X-MICROCMS-API-KEY': API_KEY } }
      );
      if (!res.ok) throw new Error('API取得エラー');
      const data = await res.json();
      allWorks = data.contents;
    } catch (e) {
      console.error(e);
      alert('データの取得に失敗しました。APIキーとサービスIDを確認してください。');
    } finally {
      showLoading(false);
      renderCategoryGrid();
    }
  }

  // ==============================
  // カテゴリグリッドを描画
  // ==============================
  function renderCategoryGrid() {
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = CATEGORY_ORDER.map(key => {
      const cat = CATEGORIES[key];
      const count = allWorks.filter(w => w.category === key).length;
      const isEmpty = count === 0;
      return `
        <div class="category-card ${isEmpty ? 'disabled' : ''}"
             ${isEmpty ? '' : `onclick="showCategory('${key}')"`}>
          <div class="category-icon">${cat.emoji}</div>
          <div>
            <div class="category-label">${cat.label}</div>
            ${isEmpty
              ? `<div class="no-works-badge">準備中</div>`
              : `<div class="category-count">${count}件の実績</div>`
            }
          </div>
        </div>
      `;
    }).join('');
  }

  // ==============================
  // カテゴリページを表示
  // ==============================
  function showCategory(key) {
    const cat = CATEGORIES[key];
    const works = allWorks.filter(w => w.category === key);

    document.getElementById('categoryTitle').textContent = cat.label;
    document.getElementById('categorySubtitle').textContent = cat.subtitle;

    const grid = document.getElementById('worksGrid');
    grid.innerHTML = works.map(w => `
      <div class="work-card">
        <div class="work-thumb">
          ${w.thumbnail
            ? `<img src="${w.thumbnail.url}" alt="${w.title}">`
            : `<div class="work-thumb-inner">${cat.emoji}</div>`
          }
          <span class="work-tag ${cat.tagClass}">${cat.label}</span>
        </div>
        <div class="work-info">
          <div class="work-title">${w.title}</div>
          <div class="work-tags">
            ${(w.tags || []).map(t => `<span class="work-tag-pill">${t}</span>`).join('')}
          </div>
          <div class="work-actions">
            ${w.link_type === 'site' && w.link_url
              ? `<button class="btn-site btn-external" onclick="openLink('${w.title}', '${w.link_url}', 'site')">🔗 サイトを見る</button>`
              : ''
            }
            ${w.link_type === 'pdf' && w.link_url
              ? `<button class="btn-site btn-pdf" onclick="openLink('${w.title}', '${w.link_url}', 'pdf')">📄 PDF</button>`
              : ''
            }
          </div>
        </div>
      </div>
    `).join('');

    document.getElementById('topPage').classList.remove('active');
    const cp = document.getElementById('categoryPage');
    cp.classList.add('active');
    cp.style.animation = 'none';
    requestAnimationFrame(() => { cp.style.animation = ''; });

    document.getElementById('backBtn').style.display = 'flex';
  }

  // ==============================
  // トップページに戻る
  // ==============================
  function showTop() {
    document.getElementById('topPage').classList.add('active');
    document.getElementById('categoryPage').classList.remove('active');
    document.getElementById('backBtn').style.display = 'none';
    const p = document.getElementById('topPage');
    p.style.animation = 'none';
    requestAnimationFrame(() => { p.style.animation = ''; });
  }

  // ==============================
  // リンクを開く（モーダル経由）
  // ==============================
  function openLink(title, url, type) {
    const isPdf = type === 'pdf';
    document.getElementById('modalIcon').textContent = isPdf ? '📄' : '🔗';
    document.getElementById('modalTitle').textContent = isPdf ? '資料PDFを開きます' : '外部サイトを開きます';
    document.getElementById('modalBody').textContent = `「${title}」を表示します。`;
    document.getElementById('modalActionBtn').textContent = isPdf ? 'PDFを開く' : 'サイトを開く';
    document.getElementById('modalActionBtn').onclick = () => {
      window.open(url, '_blank');
      closeModal();
    };
    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }

  // モーダル外クリックで閉じる
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // 初期化
  fetchWorks();
</script>
</body>
</html>
